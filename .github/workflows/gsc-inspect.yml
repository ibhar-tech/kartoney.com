name: GSC URL Inspection (daily)

# Daily, quota-aware URL-Inspection run against Search Console.
# It inspects the next batch of URLs (cartoon pages first, then episodes),
# nudging Google to crawl them and recording what is / isn't indexed.
#
# SETUP (one time): add a repo secret named GSC_SERVICE_ACCOUNT_JSON containing
# the full service-account key JSON. See scripts/README-indexing.md.

on:
  schedule:
    - cron: '17 4 * * *' # every day ~04:17 UTC
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max URLs to inspect this run (blank = daily quota)'
        required: false

permissions:
  contents: write # to commit the resume cursor + report back to the repo

concurrency:
  group: gsc-inspect
  cancel-in-progress: false

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Run URL inspection
        env:
          # Preferred: OAuth user credentials (no service-account key needed).
          GSC_OAUTH_CLIENT_ID: ${{ secrets.GSC_OAUTH_CLIENT_ID }}
          GSC_OAUTH_CLIENT_SECRET: ${{ secrets.GSC_OAUTH_CLIENT_SECRET }}
          GSC_OAUTH_REFRESH_TOKEN: ${{ secrets.GSC_OAUTH_REFRESH_TOKEN }}
          # Fallback: service-account key (only if your org allows SA keys).
          GSC_KEY_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GSC_SITE: ${{ vars.GSC_SITE || 'https://kartoney.com/' }}
        run: node scripts/gsc-inspect.mjs ${{ github.event.inputs.limit && format('--limit {0}', github.event.inputs.limit) || '' }}
      - name: Commit resume state + report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .gsc-state.json scripts/gsc-report.json || true
          git commit -m "chore(gsc): update inspection cursor + report [skip netlify]" || echo "nothing to commit"
          git push || echo "nothing to push"
