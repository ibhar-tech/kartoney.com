name: Bing URL submission (daily)

# Daily, quota-aware URL submission to Bing.
#
# Default mode = SubmitUrlBatch: spends the small daily Webmaster quota
# (~100/day) on the next slice of URLs, cursor-resumed across days, so over
# time every page is pushed to Bing's crawl queue. The bulk IndexNow blast
# (all ~8,738 URLs at once) is run on demand via workflow_dispatch (mode: indexnow).
#
# SETUP (one time):
#   - Secret  BING_API_KEY        = your Bing Webmaster API key (apikey=… method)
#   - Var/sec BING_INDEXNOW_KEY   = the public IndexNow key (matches public/<key>.txt)

on:
  schedule:
    # GitHub cron is best-effort; two daily attempts add redundancy. A second
    # fire the same day just sees daily quota = 0 and exits cleanly (no dupes).
    - cron: '7 5 * * *'   # ~05:07 UTC
    - cron: '7 17 * * *'  # ~17:07 UTC (fallback if the morning fire is dropped)
  workflow_dispatch:
    inputs:
      mode:
        description: 'submit (daily quota) or indexnow (bulk blast all URLs)'
        required: false
        default: 'submit'
      limit:
        description: 'Max URLs this run (blank = full)'
        required: false

permissions:
  contents: write # to commit the resume cursor + report back to the repo

concurrency:
  group: bing-submit
  cancel-in-progress: false

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Submit URLs to Bing
        env:
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
          BING_INDEXNOW_KEY: ${{ vars.BING_INDEXNOW_KEY || secrets.BING_INDEXNOW_KEY }}
          BING_SITE: ${{ vars.BING_SITE || 'https://kartoney.com' }}
        run: |
          MODE='${{ github.event.inputs.mode || 'submit' }}'
          LIMIT='${{ github.event.inputs.limit }}'
          ARGS=""
          [ "$MODE" = "indexnow" ] && ARGS="--indexnow"
          [ -n "$LIMIT" ] && ARGS="$ARGS --limit $LIMIT"
          node scripts/bing-submit.mjs $ARGS
      - name: Commit resume state + report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .bing-state.json scripts/bing-report.json || true
          git commit -m "chore(bing): update submission cursor + report [skip netlify]" || echo "nothing to commit"
          git push || echo "nothing to push"
